{{- if .Values.sqld.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pp.fullname" . }}-sqld
  labels:
    {{- include "pp.labels" . | nindent 4 }}
    app.kubernetes.io/component: sqld
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "pp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: sqld
{{- end }}
