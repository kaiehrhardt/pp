suite: redis service
templates:
  - redis-service.yaml
tests:
  - it: renders nothing by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a ClusterIP service on port 6379 when enabled
    set:
      redis.enabled: true
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 6379
      - equal:
          path: spec.selector
          value:
            app.kubernetes.io/name: pp
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/component: redis
