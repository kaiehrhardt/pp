suite: serviceaccount
templates:
  - serviceaccount.yaml
tests:
  - it: creates a ServiceAccount named after the release by default
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-pp

  - it: renders nothing when creation is disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: honors an explicit name override
    set:
      serviceAccount.name: my-custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-sa
