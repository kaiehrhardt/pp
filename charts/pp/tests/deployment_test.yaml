suite: deployment
templates:
  - deployment.yaml
tests:
  - it: omits spec.replicas by default since autoscaling is enabled by default
    asserts:
      - notExists:
          path: spec.replicas

  - it: honors replicaCount when autoscaling is disabled
    set:
      autoscaling.enabled: false
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: uses the chart appVersion as the default image tag
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^ghcr\.io/kaiehrhardt/pp:[0-9]+\.[0-9]+\.[0-9]+$

  - it: honors an explicit image tag override
    set:
      image.tag: v9.9.9
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/kaiehrhardt/pp:v9.9.9

  - it: exposes the app port and matching container port env var
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3000
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PORT
            value: "3000"

  - it: points the liveness probe at the version endpoint and readiness at the ready endpoint
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/version
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api/ready

  - it: mounts a writable /tmp when the root filesystem is read-only
    set:
      securityContext.readOnlyRootFilesystem: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp

  - it: omits the tmp volume when the root filesystem is writable
    set:
      securityContext.readOnlyRootFilesystem: false
    asserts:
      - notExists:
          path: spec.template.spec.volumes
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts

  - it: drops all capabilities and disallows privilege escalation
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          value: ["ALL"]

  - it: omits spec.replicas when autoscaling is enabled so the HPA stays in control
    set:
      autoscaling.enabled: true
    asserts:
      - notExists:
          path: spec.replicas

  - it: passes through extra environment variables
    set:
      extraEnv:
        - name: FOO
          value: bar
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FOO
            value: bar

  - it: omits LOG_LEVEL by default
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_LEVEL

  - it: sets LOG_LEVEL when logLevel is given
    set:
      logLevel: debug
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_LEVEL
            value: debug

  - it: omits REDIS_URL/TURSO_DATABASE_URL by default (neither bundled service enabled)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_URL
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: TURSO_DATABASE_URL

  - it: auto-wires REDIS_URL and TURSO_DATABASE_URL at the bundled services when enabled
    set:
      redis.enabled: true
      sqld.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_URL
            value: "redis://RELEASE-NAME-pp-redis:6379"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TURSO_DATABASE_URL
            value: "http://RELEASE-NAME-pp-sqld:8080"

  - it: scopes the selector and pod label to the app component, excluding bundled redis/sqld pods
    set:
      redis.enabled: true
      sqld.enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels
          value:
            app.kubernetes.io/name: pp
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/component: app
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: app

  - it: lets extraEnv override the auto-wired REDIS_URL, since it's appended last
    set:
      redis.enabled: true
      extraEnv:
        - name: REDIS_URL
          value: redis://external-redis:6379
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[-1]
          value:
            name: REDIS_URL
            value: redis://external-redis:6379
