suite: hpa
templates:
  - hpa.yaml
tests:
  - it: renders with the default min/max replicas, since room state is Turso/Redis-backed
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.scaleTargetRef.name
          value: RELEASE-NAME-pp
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 3

  - it: renders nothing when explicitly disabled
    set:
      autoscaling.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: targets the deployment with the configured min/max replicas when overridden
    set:
      autoscaling.minReplicas: 2
      autoscaling.maxReplicas: 5
    asserts:
      - equal:
          path: spec.scaleTargetRef.name
          value: RELEASE-NAME-pp
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 5
