suite: hpa
templates:
  - hpa.yaml
tests:
  - it: renders nothing by default, since scaling out breaks in-memory room state
    asserts:
      - hasDocuments:
          count: 0

  - it: targets the deployment with the configured min/max replicas when enabled
    set:
      autoscaling.enabled: true
      autoscaling.minReplicas: 2
      autoscaling.maxReplicas: 5
    asserts:
      - equal:
          path: spec.scaleTargetRef.name
          value: RELEASE-NAME-pp
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 5
