# -- Number of pod replicas.
# Room state now lives in Turso (libSQL), with cross-pod WebSocket delivery over Redis
# pub/sub — see ADR-0003 (docs/adr/0003-turso-and-redis-for-horizontal-scaling.md),
# which superseded the single-replica constraint from ADR-0001. Requires
# TURSO_DATABASE_URL/TURSO_AUTH_TOKEN and REDIS_URL, either set via extraEnv below
# (pointing at a real Turso database/sqld instance and a reachable Redis) or provided by
# enabling redis.enabled/sqld.enabled below to bundle minimal in-cluster instances of
# both — without one or the other, the app falls back to a local file and won't share
# state across replicas at all.
replicaCount: 2

image:
  repository: ghcr.io/kaiehrhardt/pp
  pullPolicy: IfNotPresent
  # -- Overrides the image tag; defaults to the chart's appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount for the pod.
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

# -- The image's Dockerfile has no USER directive, so the container runs as root by
# default (oven/bun:1's default user). Setting runAsNonRoot here would crash-loop the
# pod. If the image is later changed to run as a non-root user, add runAsNonRoot/
# runAsUser to podSecurityContext to match.
podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example for the nginx ingress controller, which by default closes idle upstream
  # connections after a few minutes and can drop the app's WebSocket connections:
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  #   nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: pp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: pp-tls
  #   hosts:
  #     - pp.example.com

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Liveness probe hits the lightweight version endpoint (no external dependencies,
# so a transient Turso/Redis blip doesn't get the pod killed and restarted).
livenessProbe:
  httpGet:
    path: /api/version
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Readiness probe hits /api/ready, which pings both Turso and Redis. A transient
# blip in either marks the pod Not-Ready (stops receiving traffic) without restarting it.
readinessProbe:
  httpGet:
    path: /api/ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Safe to enable now that room state is Turso-backed and cross-pod events flow
# through Redis (see the replicaCount note above) — scaling out no longer breaks room
# consistency the way it did under ADR-0001's in-memory model.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# -- Extra environment variables for the container. Requires TURSO_DATABASE_URL,
# TURSO_AUTH_TOKEN, and REDIS_URL for a multi-replica deployment (see the replicaCount
# note above) — supply them via an out-of-band-managed Secret (sealed-secrets,
# external-secrets, or a manually created `kubectl create secret`), not inline values,
# so credentials don't end up committed in this file. Example:
#   - name: TURSO_DATABASE_URL
#     valueFrom:
#       secretKeyRef:
#         name: pp-turso
#         key: database-url
#   - name: TURSO_AUTH_TOKEN
#     valueFrom:
#       secretKeyRef:
#         name: pp-turso
#         key: auth-token
#   - name: REDIS_URL
#     valueFrom:
#       secretKeyRef:
#         name: pp-redis
#         key: url
extraEnv: []

# -- Bundle a minimal in-cluster Redis for cross-pod pub/sub (see ADR-0003), instead of
# pointing REDIS_URL at an external instance via extraEnv above. When enabled, the app's
# REDIS_URL is wired up automatically — don't also set it via extraEnv (extraEnv wins if
# you do, since it's appended last, but that's almost certainly not what you want).
# A single Pod, no persistence, no auth, no HA — this is a bundled convenience for
# small/self-hosted deployments, not a substitute for a managed Redis at real scale.
redis:
  enabled: false
  image:
    repository: redis
    tag: 7-alpine
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# -- Bundle Turso's open-source server (sqld) as the app's Turso backend, instead of
# pointing TURSO_DATABASE_URL at hosted Turso (or an externally-run sqld) via extraEnv
# above. When enabled, TURSO_DATABASE_URL is wired up automatically (same caveat as
# redis.enabled above re: extraEnv). Always exactly 1 replica regardless of any
# replicaCount-like setting — sqld itself isn't distributed, it's the app's single
# shared backing store (the app's own replicas are what scales). A single Pod backed by
# a PersistentVolumeClaim; for real backup/HA/multi-region, use hosted Turso instead.
sqld:
  enabled: false
  image:
    repository: ghcr.io/tursodatabase/libsql-server
    tag: latest
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  persistence:
    size: 1Gi
    # -- Leave empty to use the cluster's default StorageClass.
    storageClassName: ""

nodeSelector: {}
tolerations: []
affinity: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1
